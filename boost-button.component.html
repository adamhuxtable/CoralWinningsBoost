<button
  class="boost-btn"
  [class.is-boosted]="isBoosted"
  [disabled]="isBoosted"
  (click)="onBoost()"
  type="button"
>
  <!-- Shimmer overlay, triggered on boost -->
  <span class="shimmer" aria-hidden="true"></span>

  <!-- Default label -->
  <span class="btn-label boost-label">BOOST BY {{ percentage }}%</span>

  <!-- Boosted label -->
  <span class="btn-label boosted-label">BOOSTED BY {{ percentage }}%</span>
</button>
